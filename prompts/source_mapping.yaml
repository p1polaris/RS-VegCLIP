# Coarse-grained concepts used in training
coarse_grained_concepts:
  - green vegetation
  - woody plant
  - herbaceous cover
  - scrub vegetation

# Test categories (unseen categories in zero-shot protocol)
test_categories:
  - forest
  - farmland
  - grassland
  - shrubland

# Mapping rule description
mapping_rule_description: |
  All vegetation-related labels from the 10 source datasets are mapped to coarse-grained concepts
  (e.g., "green vegetation") during feature library construction. Original fine-grained labels
  (e.g., "forest", "grassland") are not used as category names in the training process.
  Ambiguous categories (e.g., "wetland") are excluded to prevent semantic leakage.
  Non-vegetation categories are ignored.